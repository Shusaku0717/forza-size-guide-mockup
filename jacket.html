<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ジャケットのサイズの測り方</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">FORZA</a>
    <nav class="nav" aria-label="確認用ナビゲーション">
      <a class="current" href="jacket.html">ジャケット</a>
      <a href="shirt.html">シャツ</a>
      <a href="pants.html">パンツ</a>
    </nav>
  </header>

  <main class="page guide-page">
    <section class="guide-hero">
      <span class="label">SIZE GUIDE</span>
      <h1>ジャケットのサイズの測り方</h1>
      <p>ジャケット選びに必要な採寸項目だけをまとめています。ご自身で測りにくい場合は、手持ちのジャケットやアウターを使って近いサイズを確認します。</p>
      <div class="pill-list">
        <span>肩幅</span><span>ゆきたけ</span><span>胸まわり</span><span>胴まわり</span><span>きたけ</span><span>裾まわり</span><span>アームホール</span>
      </div>
    </section>

    <section class="video-grid" aria-label="ジャケット採寸動画">
      <article class="video-card"><div class="thumb"><img src="assets/shoulder.jpg" alt="肩幅の測り方"><span class="play"></span></div><div class="card-body"><strong>肩幅</strong><span>肩先から肩先までを確認します。</span></div></article>
      <article class="video-card"><div class="thumb"><img src="assets/yuki.jpg" alt="ゆきたけの測り方"><span class="play"></span></div><div class="card-body"><strong>ゆきたけ</strong><span>首の後ろから肩を通り、手首までを確認します。</span></div></article>
      <article class="video-card"><div class="thumb"><img src="assets/chest.jpg" alt="胸まわりの測り方"><span class="play"></span></div><div class="card-body"><strong>胸まわり</strong><span>胸の一番高い位置を水平に確認します。</span></div></article>
      <article class="video-card"><div class="thumb"><img src="assets/waist_body.jpg" alt="胴まわりの測り方"><span class="play"></span></div><div class="card-body"><strong>胴まわり</strong><span>お腹まわりの位置を水平に確認します。</span></div></article>
      <article class="video-card"><div class="thumb"><img src="assets/length.jpg" alt="きたけの測り方"><span class="play"></span></div><div class="card-body"><strong>きたけ</strong><span>首の後ろから裾までを確認します。</span></div></article>
      <article class="video-card"><div class="thumb"><img src="assets/hem.jpg" alt="裾まわりの測り方"><span class="play"></span></div><div class="card-body"><strong>裾まわり</strong><span>裾の位置を一周して確認します。</span></div></article>
      <article class="video-card"><div class="thumb"><img src="assets/armhole.jpg" alt="アームホールの測り方"><span class="play"></span></div><div class="card-body"><strong>アームホール</strong><span>腕の付け根まわりを確認します。</span></div></article>
    </section>
  </main>
</body>
</html>
